<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="card-header bg-primary text-white text-center py-4 rounded-top-4">
                    <h2 class="mb-0 fw-bold">Lista de Tareas</h2>
                </div>
                <div class="card-body p-4">
                    <form (ngSubmit)="addTask()" class="d-flex mb-4 gap-2">
                        <input type="text" [(ngModel)]="taskNewTitle" name="taskNewTitle" 
                               class="form-control form-control-lg rounded-pill px-4 shadow-sm" 
                               placeholder="¿Qué necesitas hacer?">
                        <button type="submit" class="btn btn-success btn-lg rounded-pill px-4 shadow-sm fw-bold" [disabled]="!taskNewTitle.trim()">
                            Agregar
                        </button>
                    </form>

                    <ul class="list-group list-group-flush gap-2">
                        <li *ngFor="let task of task" 
                            class="list-group-item d-flex justify-content-between align-items-center border rounded-3 shadow-sm py-3 px-4 mb-2 bg-light">
                            <span class="fs-5 text-secondary">{{task.title}}</span>
                            <button (click)="deleteTask(task.id)" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">
                                Eliminar
                            </button>
                        </li>
                    </ul>
                    
                    <div *ngIf="task.length === 0" class="text-center text-muted mt-4">
                        <p class="mb-0 d-flex align-items-center justify-content-center gap-2">
                            ¡No hay tareas pendientes! 
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" class="text-warning" viewBox="0 0 16 16">
                                <path d="M3.612 15.443c-.386.198-.824-.149-.746-.592l.83-4.73L.173 6.765c-.329-.314-.158-.888.283-.95l4.898-.696L7.538.792c.197-.39.73-.39.927 0l2.184 4.327 4.898.696c.441.062.612.636.282.95l-3.522 3.356.83 4.73c.078.443-.36.79-.746.592L8 13.187l-4.389 2.256z"/>
                            </svg>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
